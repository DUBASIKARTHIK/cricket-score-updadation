<!DOCTYPE html>
<html>
<head>
<title>CREX Login</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --green: #00ff88;
    --red: #ff3b5c;
    --text: #e2e8f0;
    --muted: #64748b;
    --font: 'Rajdhani', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-image: url("{{ url_for('static', filename='images/image2.jpg') }}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: var(--font);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(10, 14, 26, 0.72);
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(0,212,255,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 70%, rgba(255,107,53,0.06) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    background: rgba(17, 24, 39, 0.82);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 30px 28px;
    width: 300px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,212,255,0.06);
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .logo-text {
    font-size: 26px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 3px;
  }

  .tagline {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .input-group {
    position: relative;
    margin-bottom: 12px;
    text-align: left;
  }

  .input-label {
    display: block;
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 5px;
  }

  input {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
  }

  input::placeholder { color: var(--muted); font-weight: 400; }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 16px;
    margin-bottom: 10px;
  }

  button {
    padding: 10px 8px;
    border: 1px solid;
    border-radius: 8px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s ease;
  }

  button:active { transform: scale(0.97); }

  .btn-login {
    background: rgba(0,212,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-login:hover { background: rgba(0,212,255,0.2); }

  .btn-signup {
    background: rgba(0,255,136,0.08);
    border-color: var(--green);
    color: var(--green);
  }
  .btn-signup:hover { background: rgba(0,255,136,0.18); }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 14px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider span {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn-google {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 10px;
    background: rgba(234,67,53,0.08);
    border: 1px solid rgba(234,67,53,0.5);
    border-radius: 8px;
    color: #ea4335;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s ease;
  }
  .btn-google:hover { background: rgba(234,67,53,0.18); border-color: #ea4335; }

  .google-icon {
    width: 18px; height: 18px;
    background: #ea4335;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: white;
    font-weight: 700;
    flex-shrink: 0;
  }

  #msg {
    margin-top: 14px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--red);
    min-height: 18px;
    line-height: 1.4;
  }

  #msg.success { color: var(--green); }
</style>
</head>
<body>

<div class="card">

  <div class="logo">
    <div class="logo-icon">🏏</div>
    <div class="logo-text">CREX</div>
  </div>
  <div class="tagline">Live Cricket Scores</div>

  <div class="input-group">
    <label class="input-label">Email</label>
    <input id="email" type="email" placeholder="you@example.com" />
  </div>

  <div class="input-group">
    <label class="input-label">Password</label>
    <input id="password" type="password" placeholder="••••••••" />
  </div>

  <div class="btn-row">
    <button class="btn-login" onclick="login()">Login</button>
    <button class="btn-signup" onclick="signup()">Sign Up</button>
  </div>

  <div class="divider"><span>or</span></div>

  <button class="btn-google" onclick="googleLogin()">
    <div class="google-icon">G</div>
    Sign in with Google
  </button>

  <p id="msg"></p>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://kgmvprtxxvkaavqziwpx.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnbXZwcnR4eHZrYWF2cXppd3B4Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MTM0MTIyMCwiZXhwIjoyMDg2OTE3MjIwfQ.3N3nLWx7ZnfvSCdQOAbCn9TWByxCTep5Ycm3HVUigfI"
);

function setMsg(text, type='error') {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = type;
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { setMsg('Enter email and password'); return; }

  setMsg('Logging in...', 'info');
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) { setMsg(error.message); }
  else { setMsg('Welcome back!', 'success'); setTimeout(() => window.location = '/matches', 500); }
}

async function signup() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { setMsg('Enter email and password'); return; }
  if (password.length < 6) { setMsg('Password must be at least 6 characters'); return; }

  setMsg('Creating account...', 'info');
  const { error } = await supabaseClient.auth.signUp({ email, password });
  if (error) { setMsg(error.message); }
  else { setMsg('Account created! Check your email to confirm.', 'success'); }
}

async function googleLogin() {
  await supabaseClient.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/matches' }
  });
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>

</body>
</html>

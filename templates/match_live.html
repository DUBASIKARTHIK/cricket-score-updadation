<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CREX — Live Score</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#0a0e1a; --surface:#111827; --surface2:#1a2235; --border:#1e3a5f;
    --accent:#00d4ff; --accent2:#ff6b35; --green:#00ff88; --red:#ff3b5c;
    --yellow:#ffd700; --text:#e2e8f0; --muted:#64748b;
    --font:'Rajdhani',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  * { margin:0;padding:0;box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }
  body::before { content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(ellipse at 15% 25%,rgba(0,212,255,.05) 0%,transparent 55%),
               radial-gradient(ellipse at 85% 75%,rgba(255,107,53,.04) 0%,transparent 55%); }

  /* NAVBAR */
  .navbar { position:sticky;top:0;z-index:50; background:rgba(10,14,26,.92);backdrop-filter:blur(16px); border-bottom:1px solid var(--border); display:flex;align-items:center;justify-content:space-between;padding:12px 20px; }
  .back-btn { display:flex;align-items:center;gap:6px; color:var(--muted);font-family:var(--mono);font-size:12px;cursor:pointer;transition:color .15s; }
  .back-btn:hover { color:var(--accent); }
  .nav-logo { display:flex;align-items:center;gap:8px; }
  .nav-icon { width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px; }
  .nav-brand { font-size:18px;font-weight:700;color:var(--green);letter-spacing:3px; }
  .live-pill { display:flex;align-items:center;gap:5px;font-size:11px;color:var(--red);font-family:var(--mono);font-weight:700;background:rgba(255,59,92,.07);border:1px solid rgba(255,59,92,.25);padding:3px 10px;border-radius:20px; }
  .live-pill::before { content:'';width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.2s ease-in-out infinite; }
  .live-pill.done { color:var(--muted);border-color:var(--border);background:transparent; }
  .live-pill.done::before { background:var(--muted);animation:none; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)} }

  .main { max-width:640px;margin:0 auto;padding:20px 14px;position:relative;z-index:1; }

  /* MATCH HEADER */
  .match-header { background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 20px;margin-bottom:14px;position:relative;overflow:hidden; }
  .match-header::before { content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2)); }
  .teams-title { font-size:22px;font-weight:700;text-align:center;margin-bottom:4px;letter-spacing:.5px; }
  .match-info { text-align:center;font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:18px; }

  /* BIG SCORE */
  .score-hero { display:flex;align-items:baseline;justify-content:center;gap:6px;margin-bottom:6px; }
  .score-runs { font-size:64px;font-weight:700;color:var(--text);line-height:1;font-family:var(--mono); }
  .score-sep { font-size:40px;color:var(--muted);font-family:var(--mono); }
  .score-wkts { font-size:40px;font-weight:700;color:var(--red);font-family:var(--mono); }
  .score-overs-line { text-align:center;font-size:14px;color:var(--muted);font-family:var(--mono);margin-bottom:14px; }
  .score-overs-line span { color:var(--accent);font-weight:700; }

  /* PROGRESS */
  .progress-wrap { margin-bottom:0; }
  .progress-bg { height:5px;background:var(--surface2);border-radius:3px;overflow:hidden; }
  .progress-fill { height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .6s ease; }

  /* CRR */
  .crr-row { display:flex;align-items:center;justify-content:center;gap:20px;margin-top:12px; }
  .crr-item { text-align:center; }
  .crr-val { font-size:18px;font-weight:700;font-family:var(--mono);color:var(--yellow); }
  .crr-lbl { font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:1.5px; }

  /* PLAYERS ON FIELD */
  .on-field { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:14px; }
  .section-hdr { font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;font-family:var(--mono);margin-bottom:12px; }
  .batsmen-grid { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px; }
  .player-box { background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px; }
  .player-box.striker { border-color:rgba(0,212,255,.35); }
  .p-label { font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px; }
  .p-name { font-size:15px;font-weight:700;margin-bottom:4px; }
  .p-stats { font-size:11px;color:var(--accent);font-family:var(--mono); }
  .striker-dot { display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-right:5px;animation:pulse 1.4s ease-in-out infinite; }
  .bowler-row { background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between; }
  .b-left .p-label { margin-bottom:3px; }

  /* OVER BALLS */
  .over-panel { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px; }
  .over-chips { display:flex;gap:7px;flex-wrap:wrap; }
  .chip { width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:var(--mono);border:2px solid var(--border);background:var(--surface2);color:var(--muted); }
  .chip.c0 { border-color:var(--muted);color:var(--muted);background:rgba(100,116,139,.15); }
  .chip.c1,.chip.c2,.chip.c3,.chip.c5 { border-color:var(--text);color:var(--text);background:rgba(226,232,240,.08); }
  .chip.c4 { border-color:var(--green);color:var(--green);background:rgba(0,255,136,.1); }
  .chip.c6 { border-color:var(--yellow);color:var(--yellow);background:rgba(255,215,0,.1); }
  .chip.cW { border-color:var(--red);color:var(--red);background:rgba(255,59,92,.1); }
  .chip.cNB,.chip.cWD { border-color:var(--accent2);color:var(--accent2);background:rgba(255,107,53,.1); }
  .chip.empty { border-style:dashed;opacity:.4; }

  /* SCORECARD TABS */
  .tabs { display:flex;gap:0;margin-bottom:0;border-bottom:1px solid var(--border); }
  .tab { flex:1;padding:11px;text-align:center;font-size:12px;font-family:var(--mono);font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;letter-spacing:1px;text-transform:uppercase; }
  .tab.active { color:var(--accent);border-bottom-color:var(--accent); }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  .scorecard { background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px; }
  .sc-header { display:grid;padding:8px 14px;background:var(--surface2);font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border); }
  .bat-header { grid-template-columns:1fr 40px 40px 40px 40px 40px; }
  .bowl-header { grid-template-columns:1fr 40px 40px 40px 40px; }
  .sc-row { display:grid;padding:10px 14px;border-bottom:1px solid rgba(30,58,95,.4);transition:background .15s;align-items:center; }
  .sc-row:last-child { border-bottom:none; }
  .sc-row:hover { background:var(--surface2); }
  .bat-row { grid-template-columns:1fr 40px 40px 40px 40px 40px; }
  .bowl-row { grid-template-columns:1fr 40px 40px 40px 40px; }
  .sc-name { font-size:14px;font-weight:700; }
  .sc-out { font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:1px; }
  .sc-val { font-size:13px;font-family:var(--mono);text-align:right;color:var(--text); }
  .sc-val.hi { color:var(--green);font-weight:700; }
  .sc-val.out { color:var(--red); }
  .sc-val.acc { color:var(--yellow); }

  /* BALL HISTORY */
  .history-panel { background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px; }
  .hist-hdr { display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer; }
  .hist-hdr h3 { font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;font-family:var(--mono); }
  .hist-toggle { color:var(--muted);font-size:16px;transition:transform .2s; }
  .hist-toggle.open { transform:rotate(180deg); }
  .hist-body { max-height:0;overflow:hidden;transition:max-height .3s ease; }
  .hist-body.open { max-height:500px;overflow-y:auto; }
  .hist-row { display:flex;align-items:center;gap:8px;padding:9px 16px;border-bottom:1px solid rgba(30,58,95,.4);font-size:12px;font-family:var(--mono); }
  .hist-row:last-child { border-bottom:none; }
  .hist-ref { color:var(--muted);font-size:11px;min-width:32px; }
  .hist-result { font-weight:700;min-width:44px; }
  .hist-players { flex:1;color:var(--muted);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }

  /* LOADING */
  .loading { text-align:center;padding:60px;color:var(--muted);font-family:var(--mono);font-size:13px; }
  .spinner { width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px; }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<nav class="navbar">
  <div class="back-btn" onclick="window.location='/matches'">← Back</div>
  <div class="nav-logo">
    <div class="nav-icon">🏏</div>
    <div class="nav-brand">CREX</div>
  </div>
  <div class="live-pill" id="statusPill">LIVE</div>
</nav>

<div class="main" id="mainContent">
  <div class="loading"><div class="spinner"></div>Loading match...</div>
</div>

<script>
const matchId = {{ match_id }};
const supabaseClient = supabase.createClient(
  "https://kgmvprtxxvkaavqziwpx.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnbXZwcnR4eHZrYWF2cXppd3B4Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MTM0MTIyMCwiZXhwIjoyMDg2OTE3MjIwfQ.3N3nLWx7ZnfvSCdQOAbCn9TWByxCTep5Ycm3HVUigfI"
);

let match = null, batsmen = [], bowlers = [], balls = [];
let activeTab = 'batting';

async function loadAll() {
  const [mRes, batRes, bowlRes, ballRes] = await Promise.all([
    supabaseClient.from('matches').select('*').eq('id', matchId).single(),
    supabaseClient.from('batsmen').select('*').eq('match_id', matchId).order('id'),
    supabaseClient.from('bowlers').select('*').eq('match_id', matchId).order('id'),
    supabaseClient.from('balls').select('*').eq('match_id', matchId).order('over_no').order('ball_no')
  ]);
  match = mRes.data;
  batsmen = batRes.data || [];
  bowlers = bowlRes.data || [];
  balls = ballRes.data || [];
  render();
}

function render() {
  if (!match) return;
  const isLive = match.status === 'live';
  const pill = document.getElementById('statusPill');
  pill.textContent = isLive ? 'LIVE' : match.status.toUpperCase();
  if (!isLive) pill.classList.add('done');

  const overs = match.overs || '0.0';
  const overNum = parseFloat(overs);
  const pct = match.overs_limit ? Math.min(100, (overNum / match.overs_limit) * 100) : 0;

  // CRR
  const legalBalls = balls.filter(b => !b.extra).length;
  const crr = legalBalls > 0 ? ((match.runs / legalBalls) * 6).toFixed(2) : '0.00';

  // Current over balls
  const curOverParts = overs.split('.');
  const curOver = parseInt(curOverParts[0]);
  const legalThisOver = balls.filter(b => b.over_no === curOver && b.extra !== 'WD' && b.extra !== 'NB');
  const extrasThisOver = balls.filter(b => b.over_no === curOver && (b.extra === 'WD' || b.extra === 'NB'));

  let overChips = '';
  for (let i = 0; i < 6; i++) {
    const b = legalThisOver[i];
    if (b) { const lbl = b.wicket ? 'W' : String(b.runs); overChips += `<div class="chip c${lbl}">${lbl}</div>`; }
    else overChips += `<div class="chip empty">·</div>`;
  }
  extrasThisOver.forEach(b => { overChips += `<div class="chip c${b.extra}">${b.extra}</div>`; });

  // Find striker/nonstriker from last legal ball
  const lastBall = [...balls].reverse().find(b => !b.extra);
  const striker = lastBall ? lastBall.striker : '';
  const nonStriker = lastBall ? lastBall.non_striker : '';
  const curBowler = lastBall ? lastBall.bowler : '';

  const strikerData = batsmen.find(b => b.name === striker);
  const nonStrikerData = batsmen.find(b => b.name === nonStriker);
  const bowlerData = bowlers.find(b => b.name === curBowler);

  // Batting scorecard
  const batRows = batsmen.map(b => {
    const sr = b.balls > 0 ? ((b.runs / b.balls) * 100).toFixed(1) : '0.0';
    const outCls = b.is_out ? 'out' : '';
    return `<div class="sc-row bat-row">
      <div>
        <div class="sc-name">${b.name}${b.name === striker ? ' <span class="striker-dot"></span>' : ''}</div>
        <div class="sc-out">${b.is_out ? 'out' : b.name === striker ? 'batting *' : b.name === nonStriker ? 'batting' : 'yet to bat'}</div>
      </div>
      <div class="sc-val ${b.is_out ? 'out' : 'hi'}">${b.runs}</div>
      <div class="sc-val">${b.balls}</div>
      <div class="sc-val">${b.fours || 0}</div>
      <div class="sc-val">${b.sixes || 0}</div>
      <div class="sc-val acc">${sr}</div>
    </div>`;
  }).join('');

  // Bowling scorecard
  const bowlRows = bowlers.map(b => {
    const overs = Math.floor(b.balls / 6) + '.' + (b.balls % 6);
    const econ = b.balls > 0 ? ((b.runs_given / b.balls) * 6).toFixed(2) : '0.00';
    return `<div class="sc-row bowl-row">
      <div><div class="sc-name">${b.name}</div></div>
      <div class="sc-val">${overs}</div>
      <div class="sc-val">${b.runs_given}</div>
      <div class="sc-val hi">${b.wickets}</div>
      <div class="sc-val acc">${econ}</div>
    </div>`;
  }).join('');

  // Ball history
  const histRows = [...balls].reverse().map(b => {
    const lbl = b.wicket ? '🔴 W' : b.extra ? '⚡ ' + b.extra : String(b.runs);
    const cls = b.wicket ? 'var(--red)' : b.extra ? 'var(--accent2)' : b.runs >= 4 ? 'var(--green)' : 'var(--text)';
    const ref = (b.extra === 'WD' || b.extra === 'NB') ? `${b.over_no}.${b.ball_no}*` : `${b.over_no}.${b.ball_no}`;
    return `<div class="hist-row">
      <span class="hist-ref">${ref}</span>
      <span class="hist-result" style="color:${cls}">${lbl}</span>
      <span class="hist-players">${b.striker || ''} ${b.bowler ? '/ ' + b.bowler : ''}</span>
    </div>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `

    <!-- MATCH HEADER -->
    <div class="match-header">
      <div class="teams-title">${match.team_batting} vs ${match.team_bowling}</div>
      <div class="match-info">${match.overs_limit ? match.overs_limit + ' Overs' : ''}${match.venue ? ' · ' + match.venue : ''}${match.toss_winner ? ' · Toss: ' + match.toss_winner : ''}</div>
      <div class="score-hero">
        <div class="score-runs">${match.runs ?? 0}</div>
        <div class="score-sep">/</div>
        <div class="score-wkts">${match.wickets ?? 0}</div>
      </div>
      <div class="score-overs-line">Overs: <span>${overs}</span>${match.overs_limit ? ' / ' + match.overs_limit : ''}</div>
      ${match.overs_limit ? `<div class="progress-wrap"><div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div></div>` : ''}
      <div class="crr-row">
        <div class="crr-item"><div class="crr-val">${crr}</div><div class="crr-lbl">CRR</div></div>
        <div class="crr-item"><div class="crr-val">${balls.filter(b=>b.wicket).length}</div><div class="crr-lbl">Wickets</div></div>
        <div class="crr-item"><div class="crr-val">${balls.filter(b=>b.extra==='WD').length}</div><div class="crr-lbl">Wides</div></div>
        <div class="crr-item"><div class="crr-val">${balls.filter(b=>b.extra==='NB').length}</div><div class="crr-lbl">No Balls</div></div>
      </div>
    </div>

    <!-- ON FIELD -->
    <div class="on-field">
      <div class="section-hdr">🏏 On Field</div>
      <div class="batsmen-grid">
        <div class="player-box striker">
          <div class="p-label"><span class="striker-dot"></span>Striker</div>
          <div class="p-name">${striker || '—'}</div>
          <div class="p-stats">${strikerData ? strikerData.runs + ' (' + strikerData.balls + ')' + (strikerData.fours ? ' ' + strikerData.fours + '×4' : '') + (strikerData.sixes ? ' ' + strikerData.sixes + '×6' : '') : '—'}</div>
        </div>
        <div class="player-box">
          <div class="p-label">Non-Striker</div>
          <div class="p-name">${nonStriker || '—'}</div>
          <div class="p-stats">${nonStrikerData ? nonStrikerData.runs + ' (' + nonStrikerData.balls + ')' : '—'}</div>
        </div>
      </div>
      <div class="bowler-row">
        <div class="b-left">
          <div class="p-label">🎳 Bowling</div>
          <div class="p-name">${curBowler || '—'}</div>
        </div>
        <div class="p-stats" style="font-family:var(--mono);font-size:12px;color:var(--accent)">${bowlerData ? bowlerData.wickets + '-' + bowlerData.runs_given + ' (' + Math.floor(bowlerData.balls/6) + '.' + (bowlerData.balls%6) + ')' : '—'}</div>
      </div>
    </div>

    <!-- CURRENT OVER -->
    <div class="over-panel">
      <div class="section-hdr" style="margin-bottom:10px">This Over — Over ${curOver}</div>
      <div class="over-chips">${overChips}</div>
    </div>

    <!-- SCORECARD TABS -->
    <div class="scorecard">
      <div class="tabs">
        <div class="tab ${activeTab==='batting'?'active':''}" onclick="switchTab('batting')">Batting</div>
        <div class="tab ${activeTab==='bowling'?'active':''}" onclick="switchTab('bowling')">Bowling</div>
      </div>
      <div class="tab-panel ${activeTab==='batting'?'active':''}" id="tabBatting">
        <div class="sc-header bat-header"><span>Batsman</span><span style="text-align:right">R</span><span style="text-align:right">B</span><span style="text-align:right">4s</span><span style="text-align:right">6s</span><span style="text-align:right">SR</span></div>
        ${batRows || '<div style="padding:14px 16px;color:var(--muted);font-family:var(--mono);font-size:12px">No batsmen yet</div>'}
      </div>
      <div class="tab-panel ${activeTab==='bowling'?'active':''}" id="tabBowling">
        <div class="sc-header bowl-header"><span>Bowler</span><span style="text-align:right">O</span><span style="text-align:right">R</span><span style="text-align:right">W</span><span style="text-align:right">Eco</span></div>
        ${bowlRows || '<div style="padding:14px 16px;color:var(--muted);font-family:var(--mono);font-size:12px">No bowlers yet</div>'}
      </div>
    </div>

    <!-- BALL BY BALL -->
    <div class="history-panel">
      <div class="hist-hdr" onclick="toggleHist()">
        <h3>Ball-by-Ball</h3>
        <div class="hist-toggle" id="histToggle">▾</div>
      </div>
      <div class="hist-body" id="histBody">
        ${histRows || '<div style="padding:14px 16px;color:var(--muted);font-family:var(--mono);font-size:12px">No balls yet</div>'}
      </div>
    </div>
  `;
}

function switchTab(tab) {
  activeTab = tab;
  render();
}
function toggleHist() {
  document.getElementById('histBody').classList.toggle('open');
  document.getElementById('histToggle').classList.toggle('open');
}

// Realtime — auto update when admin scores
supabaseClient.channel('live-match-' + matchId)
  .on('postgres_changes', { event: '*', schema: 'public', table: 'matches', filter: `id=eq.${matchId}` }, payload => {
    match = payload.new;
    render();
  })
  .on('postgres_changes', { event: '*', schema: 'public', table: 'balls', filter: `match_id=eq.${matchId}` }, () => loadAll())
  .on('postgres_changes', { event: '*', schema: 'public', table: 'batsmen', filter: `match_id=eq.${matchId}` }, payload => {
    if (payload.new) { const idx = batsmen.findIndex(b => b.id === payload.new.id); if (idx >= 0) batsmen[idx] = payload.new; else batsmen.push(payload.new); render(); }
  })
  .on('postgres_changes', { event: '*', schema: 'public', table: 'bowlers', filter: `match_id=eq.${matchId}` }, payload => {
    if (payload.new) { const idx = bowlers.findIndex(b => b.id === payload.new.id); if (idx >= 0) bowlers[idx] = payload.new; else bowlers.push(payload.new); render(); }
  })
  .subscribe();

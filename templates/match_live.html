<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CREX — Live Score</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#1e3a5f;--accent:#00d4ff;--accent2:#ff6b35;--green:#00ff88;--red:#ff3b5c;--yellow:#ffd700;--text:#e2e8f0;--muted:#64748b;--font:'Rajdhani',sans-serif;--mono:'JetBrains Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 15% 25%,rgba(0,212,255,.05),transparent 55%),radial-gradient(ellipse at 85% 75%,rgba(255,107,53,.04),transparent 55%);}
.navbar{position:sticky;top:0;z-index:50;background:rgba(10,14,26,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:12px 20px;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);font-family:var(--mono);font-size:12px;cursor:pointer;transition:color .15s;}
.back-btn:hover{color:var(--accent);}
.nav-logo{display:flex;align-items:center;gap:8px;}
.nav-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.nav-brand{font-size:18px;font-weight:700;color:var(--green);letter-spacing:3px;}
.live-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--red);font-family:var(--mono);font-weight:700;background:rgba(255,59,92,.07);border:1px solid rgba(255,59,92,.25);padding:3px 10px;border-radius:20px;}
.live-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.2s ease-in-out infinite;}
.live-pill.done{color:var(--muted);border-color:var(--border);background:transparent;}
.live-pill.done::before{background:var(--muted);animation:none;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.main{max-width:660px;margin:0 auto;padding:20px 14px;position:relative;z-index:1;}

/* MATCH HEADER */
.match-header{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden;}
.match-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
.teams-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px;}
.match-meta{text-align:center;font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:16px;}

/* INNINGS TABS IN HEADER */
.inn-score-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.inn-score-tab{flex:1;padding:12px 10px;text-align:center;cursor:pointer;transition:all .2s;border-right:1px solid var(--border);}
.inn-score-tab:last-child{border-right:none;}
.inn-score-tab.active{background:rgba(0,212,255,.07);}
.inn-score-tab.inactive{opacity:.6;}
.ist-label{font-size:9px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;}
.ist-team{font-size:13px;font-weight:700;margin-bottom:3px;}
.ist-score{font-size:20px;font-weight:700;font-family:var(--mono);color:var(--text);}
.ist-score span{color:var(--red);}
.ist-overs{font-size:10px;color:var(--muted);font-family:var(--mono);}
.ist-batting{font-size:9px;color:var(--green);font-family:var(--mono);margin-top:2px;text-transform:uppercase;letter-spacing:1px;}

/* TARGET BANNER */
.target-banner{background:rgba(255,107,53,.07);border:1px solid rgba(255,107,53,.25);border-radius:8px;padding:8px 14px;text-align:center;margin-bottom:10px;font-size:13px;font-family:var(--mono);}
.target-banner b{color:var(--accent2);}

/* CRR / RRR */
.crr-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:10px;}
.crr-item{text-align:center;}
.crr-val{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--yellow);}
.crr-lbl{font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:1.5px;}
.progress-bg{height:4px;background:var(--surface2);border-radius:3px;overflow:hidden;margin:10px 0 0;}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .6s ease;}

/* ON FIELD */
.on-field{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px;}
.section-hdr{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;font-family:var(--mono);margin-bottom:10px;}
.batsmen-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.player-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.player-box.striker{border-color:rgba(0,212,255,.35);}
.p-label{font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;}
.p-name{font-size:14px;font-weight:700;margin-bottom:3px;}
.p-stats{font-size:11px;color:var(--accent);font-family:var(--mono);}
.striker-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-right:5px;animation:pulse 1.4s ease-in-out infinite;}
.bowler-row{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;}

/* OVER BALLS */
.over-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:14px;}
.over-chips{display:flex;gap:7px;flex-wrap:wrap;}
.chip{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:var(--mono);border:2px solid var(--border);background:var(--surface2);color:var(--muted);}
.chip.c0{border-color:var(--muted);color:var(--muted);background:rgba(100,116,139,.15);}
.chip.c1,.chip.c2,.chip.c3,.chip.c5{border-color:var(--text);color:var(--text);background:rgba(226,232,240,.08);}
.chip.c4{border-color:var(--green);color:var(--green);background:rgba(0,255,136,.1);}
.chip.c6{border-color:var(--yellow);color:var(--yellow);background:rgba(255,215,0,.1);}
.chip.cW{border-color:var(--red);color:var(--red);background:rgba(255,59,92,.1);}
.chip.cNB,.chip.cWD{border-color:var(--accent2);color:var(--accent2);background:rgba(255,107,53,.1);}
.chip.empty{border-style:dashed;opacity:.35;}

/* SCORECARD PANEL */
.sc-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.sc-top-tabs{display:flex;border-bottom:1px solid var(--border);}
.sc-top-tab{flex:1;padding:10px;text-align:center;font-size:11px;font-family:var(--mono);font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:1px;}
.sc-top-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.sc-pane{display:none;}
.sc-pane.active{display:block;}
.sc-bat-head,.sc-bowl-head{display:grid;padding:7px 14px;background:var(--surface2);font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);}
.sc-bat-head{grid-template-columns:1fr 36px 36px 36px 36px 48px;}
.sc-bowl-head{grid-template-columns:1fr 36px 36px 36px 36px 48px;}
.sc-bat-row,.sc-bowl-row{display:grid;padding:9px 14px;border-bottom:1px solid rgba(30,58,95,.4);align-items:center;transition:background .15s;}
.sc-bat-row:last-child,.sc-bowl-row:last-child{border-bottom:none;}
.sc-bat-row{grid-template-columns:1fr 36px 36px 36px 36px 48px;}
.sc-bowl-row{grid-template-columns:1fr 36px 36px 36px 36px 48px;}
.sc-bat-row:hover,.sc-bowl-row:hover{background:var(--surface2);}
.sc-name{font-size:14px;font-weight:700;}
.sc-dismiss{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
.sc-num{font-size:12px;font-family:var(--mono);text-align:right;color:var(--text);}
.sc-num.hi{color:var(--green);font-weight:700;}
.sc-num.red{color:var(--red);}
.sc-num.acc{color:var(--yellow);}
.sc-divider{padding:6px 14px;background:rgba(30,58,95,.3);font-size:10px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:2px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.sc-extras{display:flex;justify-content:space-between;padding:8px 14px;font-size:11px;font-family:var(--mono);color:var(--muted);border-bottom:1px solid rgba(30,58,95,.4);}
.sc-total{display:flex;justify-content:space-between;padding:9px 14px;font-size:13px;font-weight:700;font-family:var(--mono);background:rgba(0,212,255,.04);}
/* FOW */
.sc-fow-grid{display:flex;flex-wrap:wrap;gap:8px;padding:10px 14px;}
.sc-fow-item{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;font-family:var(--mono);}
.fow-wkt{color:var(--accent2);font-weight:700;margin-right:4px;}
.fow-info{color:var(--muted);}
/* Partnerships */
.sc-part{padding:8px 14px;border-bottom:1px solid rgba(30,58,95,.4);}
.sc-part:last-child{border-bottom:none;}
.sc-part-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.part-ord{font-size:10px;color:var(--muted);font-family:var(--mono);}
.part-names{font-size:12px;font-weight:700;}
.part-runs{font-size:12px;font-family:var(--mono);color:var(--accent2);}
.part-bar-bg{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.part-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .6s;}

/* COMMENTARY */
.comm-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.comm-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);}
.comm-title{font-size:10px;color:var(--accent);font-family:var(--mono);text-transform:uppercase;letter-spacing:1.5px;}
.comm-inn-tabs{display:flex;gap:6px;}
.comm-inn-tab{padding:3px 10px;border-radius:6px;font-size:10px;cursor:pointer;border:1px solid var(--border);color:var(--muted);transition:.2s;font-family:var(--mono);}
.comm-inn-tab.active{background:rgba(0,212,255,.12);border-color:var(--accent);color:var(--accent);}
.comm-body{max-height:350px;overflow-y:auto;}
.comm-empty{padding:24px;text-align:center;color:var(--muted);font-size:12px;font-family:var(--mono);}
.comm-ball{display:flex;align-items:flex-start;gap:10px;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,.04);}
.comm-ball:first-child{background:rgba(0,212,255,.04);}
.comm-over-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);min-width:34px;padding-top:3px;}
.comm-badge{min-width:28px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--mono);flex-shrink:0;}
.cb-dot{background:rgba(255,255,255,.07);color:var(--muted);}
.cb-1,.cb-2,.cb-3{background:rgba(255,255,255,.1);color:#eee;}
.cb-4{background:rgba(30,120,255,.3);color:#7af;}
.cb-6{background:rgba(140,0,255,.35);color:#d8b4ff;}
.cb-W{background:rgba(255,50,50,.25);color:var(--red);}
.cb-WD,.cb-NB{background:rgba(255,200,0,.15);color:var(--yellow);}
.comm-text{font-size:12px;color:var(--text);line-height:1.55;flex:1;}
.comm-text b{color:var(--accent2);}
.comm-milestone{padding:9px 16px;text-align:center;font-size:12px;font-weight:700;letter-spacing:1.5px;border-bottom:1px solid rgba(255,255,255,.06);}
.cm-fifty{background:rgba(255,200,0,.08);color:var(--yellow);}
.cm-century{background:linear-gradient(90deg,rgba(255,160,0,.1),rgba(255,215,0,.15),rgba(255,160,0,.1));color:#ffd700;}

/* LOADING */
.loading{text-align:center;padding:60px;color:var(--muted);font-family:var(--mono);font-size:13px;}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav class="navbar">
  <div class="back-btn" onclick="window.location='/matches'">← Back</div>
  <div class="nav-logo">
    <div class="nav-icon">🏏</div>
    <div class="nav-brand">CREX</div>
  </div>
  <div class="live-pill" id="statusPill">LIVE</div>
</nav>
<div class="main" id="mainContent">
  <div class="loading"><div class="spinner"></div>Loading match...</div>
</div>

<script>
const matchId = {{ match_id }};
const SUPABASE_URL="https://kgmvprtxxvkaavqziwpx.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnbXZwcnR4eHZrYWF2cXppd3B4Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MTM0MTIyMCwiZXhwIjoyMDg2OTE3MjIwfQ.3N3nLWx7ZnfvSCdQOAbCn9TWByxCTep5Ycm3HVUigfI";
const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let match=null,batsmen=[],bowlers=[],balls=[];
let scTab='bat1'; // bat1 | bowl1 | bat2 | bowl2
let commTabView=1;
// commentary store per innings
const commStore={1:[],2:[]};
const milestonesTracked={1:{},2:{}}; // {playerName: [50,100]}

async function loadAll(){
  const[mRes,batRes,bowlRes,ballRes]=await Promise.all([
    supabaseClient.from('matches').select('*').eq('id',matchId).single(),
    supabaseClient.from('batsmen').select('*').eq('match_id',matchId).order('id'),
    supabaseClient.from('bowlers').select('*').eq('match_id',matchId).order('id'),
    supabaseClient.from('balls').select('*').eq('match_id',matchId).order('over_no').order('ball_no')
  ]);
  const newBalls=ballRes.data||[];
  // detect new balls for commentary
  const prevCount=balls.length;
  match=mRes.data; batsmen=batRes.data||[]; bowlers=bowlRes.data||[]; balls=newBalls;
  // generate commentary for new balls
  if(balls.length>prevCount){
    const newOnes=balls.slice(prevCount);
    newOnes.forEach(b=>maybeAddCommentary(b));
  }
  checkMilestones();
  render();
}

function checkMilestones(){
  // check batsmen for 50/100 milestones
  [1,2].forEach(inn=>{
    batsmen.filter(b=>b.innings===inn).forEach(b=>{
      const tracked=milestonesTracked[inn][b.name]||[];
      if(b.runs>=50&&!tracked.includes(50)){
        commStore[inn].push({milestone:'fifty',text:`🏅 HALF CENTURY! ${b.name} brings up a well-deserved 50!`});
        tracked.push(50);
      }
      if(b.runs>=100&&!tracked.includes(100)){
        commStore[inn].push({milestone:'century',text:`💯 CENTURY! ${b.name} raises the bat for a magnificent hundred!`});
        tracked.push(100);
      }
      milestonesTracked[inn][b.name]=tracked;
    });
  });
}

async function maybeAddCommentary(ball){
  const inn=ball.innings||1;
  const overLbl=`${ball.over_no}.${ball.ball_no}`;
  const badge=ball.wicket?'W':ball.extra?ball.extra:String(ball.runs);
  const placeholder={over:overLbl,badge,text:'<span style="color:var(--muted);font-style:italic">generating commentary...</span>'};
  commStore[inn].push(placeholder);
  if(commTabView===inn)renderCommentary();
  // AI commentary
  const text=await fetchCommentary(ball);
  placeholder.text=text;
  if(commTabView===inn)renderCommentary();
}

async function fetchCommentary(ball){
  const innData={runs:ball.innings===1?(match?.runs||0):(match?.runs2||0),wickets:ball.innings===1?(match?.wickets||0):(match?.wickets2||0)};
  const prompt=`You are a cricket commentary generator styled like CREX/ESPNCricinfo.
Ball: Bowler=${ball.bowler}, Batsman=${ball.striker}, Result=${ball.wicket?'WICKET':ball.extra?ball.extra+' (extra)':ball.runs+' run'+(ball.runs!==1?'s':'')}, Over=${ball.over_no}.${ball.ball_no}
Write ONE punchy commentary line (12-20 words). Cricket terms. Shot description. No score info. No quotes.`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:80,messages:[{role:'user',content:prompt}]})});
    const d=await r.json();
    return d.content?.[0]?.text?.trim()||fallback(ball);
  }catch{return fallback(ball);}
}

function fallback(b){
  if(b.wicket)return`<b>${b.bowler}</b> gets the big wicket of <b>${b.striker}</b>!`;
  if(b.extra==='WD')return`Wide ball from <b>${b.bowler}</b>, no run to the batting total.`;
  if(b.extra==='NB')return`No ball from <b>${b.bowler}</b>, free hit coming up!`;
  const m={0:[`Dot ball. <b>${b.bowler}</b> keeps it tight.`,`<b>${b.striker}</b> defends solidly back down the pitch.`],1:[`<b>${b.striker}</b> nudges it to leg, easy single.`,`Rotates the strike — <b>${b.striker}</b> clips for one.`],2:[`<b>${b.striker}</b> pushes to the outfield, two runs.`],3:[`<b>${b.striker}</b> drives hard, excellent running for three.`],4:[`FOUR! <b>${b.striker}</b> drives beautifully through the covers!`,`FOUR! <b>${b.striker}</b> flicks off the pads to the boundary!`],6:[`SIX! <b>${b.striker}</b> launches <b>${b.bowler}</b> over long-on!`,`SIX! Massive strike from <b>${b.striker}</b>, right out of the ground!`]};
  const opts=m[b.runs]||m[1];
  return opts[Math.floor(Math.random()*opts.length)];
}

function switchCommTab(n){
  commTabView=n;
  document.getElementById('commInnTab1')?.classList.toggle('active',n===1);
  document.getElementById('commInnTab2')?.classList.toggle('active',n===2);
  renderCommentary();
}

function renderCommentary(){
  const el=document.getElementById('commBody');
  if(!el)return;
  const items=commStore[commTabView];
  if(!items||!items.length){el.innerHTML='<div class="comm-empty">Commentary will appear as balls are bowled</div>';return;}
  el.innerHTML=[...items].reverse().map(item=>{
    if(item.milestone)return`<div class="comm-milestone ${item.milestone==='century'?'cm-century':'cm-fifty'}">${item.text}</div>`;
    const bc=item.badge==='W'?'cb-W':item.badge==='WD'?'cb-WD':item.badge==='NB'?'cb-NB':item.badge==='6'?'cb-6':item.badge==='4'?'cb-4':item.badge==='0'?'cb-dot':`cb-${item.badge}`;
    return`<div class="comm-ball"><span class="comm-over-lbl">${item.over}</span><span class="comm-badge ${bc}">${item.badge}</span><span class="comm-text">${item.text}</span></div>`;
  }).join('');
}

function switchScTab(tab){
  scTab=tab;
  ['bat1','bowl1','bat2','bowl2'].forEach(t=>{
    document.getElementById('scTab-'+t)?.classList.toggle('active',t===tab);
    document.getElementById('scPane-'+t)?.classList.toggle('active',t===tab);
  });
}

function render(){
  if(!match)return;
  const isLive=match.status==='live';
  const pill=document.getElementById('statusPill');
  pill.textContent=isLive?'LIVE':match.status.toUpperCase();
  if(!isLive)pill.classList.add('done'); else pill.classList.remove('done');

  const inn1={runs:match.runs??0,wickets:match.wickets??0,overs:match.overs??'0.0'};
  const inn2={runs:match.runs2??0,wickets:match.wickets2??0,overs:match.overs2??'0.0'};
  const curInn=match.innings??1;
  const limit=match.overs_limit??20;

  // on-field players from last balls
  const lastLegal=[...balls].reverse().find(b=>!b.extra);
  const striker=lastLegal?.striker||'';
  const nonStriker=lastLegal?.non_striker||'';
  const curBowler=lastLegal?.bowler||'';
  const curInnN=lastLegal?.innings||1;

  // current over balls (current innings)
  const curOverBalls=balls.filter(b=>b.innings===curInn);
  const overStr=curInn===1?inn1.overs:inn2.overs;
  const overNum=parseInt(overStr.split('.')[0])||0;
  const legalThisOver=curOverBalls.filter(b=>b.over_no===overNum&&b.extra!=='WD'&&b.extra!=='NB');
  const extrasThisOver=curOverBalls.filter(b=>b.over_no===overNum&&(b.extra==='WD'||b.extra==='NB'));
  let overChips='';
  for(let i=0;i<6;i++){const b=legalThisOver[i];if(b){const l=b.wicket?'W':String(b.runs);overChips+=`<div class="chip c${l}">${l}</div>`;}else overChips+=`<div class="chip empty">·</div>`;}
  extrasThisOver.forEach(b=>{overChips+=`<div class="chip c${b.extra}">${b.extra}</div>`;});

  // CRR / RRR
  const legalTotal=balls.filter(b=>!b.extra&&b.innings===curInn).length;
  const crr=legalTotal>0?(((curInn===1?inn1.runs:inn2.runs)/legalTotal)*6).toFixed(2):'0.00';
  let rrrHtml='';
  if(curInn===2&&inn1.runs>0){
    const target=inn1.runs+1;
    const rem=target-(inn2.runs);
    const ballsLeft=(limit*6)-legalTotal;
    const rrr=ballsLeft>0?((rem*6)/ballsLeft).toFixed(2):'—';
    rrrHtml=`<div class="target-banner">Target: <b>${target}</b> &nbsp;·&nbsp; Need <b>${rem}</b> off <b>${ballsLeft}</b> balls &nbsp;·&nbsp; RRR: <b>${rrr}</b></div>`;
  }

  // progress
  const pct=Math.min(100,(parseFloat(overStr)/limit)*100);

  // scorecard data
  const bat1=batsmen.filter(b=>b.innings===1);
  const bat2=batsmen.filter(b=>b.innings===2);
  const bowl1=bowlers.filter(b=>b.innings===1&&b.balls>0);
  const bowl2=bowlers.filter(b=>b.innings===2&&b.balls>0);
  const balls1=balls.filter(b=>b.innings===1);
  const balls2=balls.filter(b=>b.innings===2);

  // FOW builder
  function buildFOW(bs,bl){
    const fowArr=[];
    let wkt=0,runs=0;
    bl.filter(b=>!b.extra).forEach(b=>{runs+=b.runs;if(b.wicket){wkt++;fowArr.push({wkt,runs,batter:b.striker,over:`${b.over_no}.${b.ball_no}`});}});
    return fowArr;
  }

  // Partnership builder
  function buildPartners(bs,bl){
    const legal=bl.filter(b=>b.extra!=='WD'&&b.extra!=='NB');
    const parts=[];
    let cur={bat1:'',bat2:'',runs:0,balls:0};
    legal.forEach(b=>{
      if(!cur.bat1){cur.bat1=b.striker;cur.bat2=b.non_striker;}
      if(b.striker!==cur.bat1&&b.striker!==cur.bat2){parts.push({...cur});cur={bat1:b.striker,bat2:b.non_striker,runs:0,balls:0};}
      cur.runs+=b.runs;cur.balls++;
      if(b.wicket){parts.push({...cur});cur={bat1:'',bat2:'',runs:0,balls:0};}
    });
    if(cur.bat1&&cur.balls>0)parts.push({...cur});
    return parts;
  }

  function batRows(bs,bl){
    if(!bs.length)return'<div style="padding:14px;color:var(--muted);font-family:var(--mono);font-size:12px">No data yet</div>';
    const lastLegalBalls=[...bl].reverse();
    const strikerNow=lastLegalBalls.find(b=>!b.extra)?.striker||'';
    const nsNow=lastLegalBalls.find(b=>!b.extra)?.non_striker||'';
    return bs.map(b=>{
      const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(1):'—';
      const status=b.is_out?'out':b.name===strikerNow?'batting ★':b.name===nsNow?'batting':'yet to bat';
      const milestone=b.runs>=100?' 💯':b.runs>=50?' 🏅':'';
      return`<div class="sc-bat-row">
        <div><div class="sc-name">${b.name}${milestone}</div><div class="sc-dismiss">${status}</div></div>
        <div class="sc-num ${b.is_out?'':'hi'}">${b.runs}</div>
        <div class="sc-num">${b.balls}</div>
        <div class="sc-num">${b.fours||0}</div>
        <div class="sc-num">${b.sixes||0}</div>
        <div class="sc-num acc">${sr}</div>
      </div>`;
    }).join('');
  }

  function bowlRows(bw){
    if(!bw.length)return'<div style="padding:14px;color:var(--muted);font-family:var(--mono);font-size:12px">No data yet</div>';
    return bw.map(b=>{
      const ov=Math.floor(b.balls/6)+'.'+(b.balls%6);
      const eco=b.balls>0?((b.runs_given*6)/b.balls).toFixed(2):'—';
      return`<div class="sc-bowl-row">
        <div><div class="sc-name">${b.name}</div></div>
        <div class="sc-num">${ov}</div>
        <div class="sc-num">0</div>
        <div class="sc-num">${b.runs_given}</div>
        <div class="sc-num hi">${b.wickets}</div>
        <div class="sc-num acc">${eco}</div>
      </div>`;
    }).join('');
  }

  function fowHtml(bs,bl){
    const fow=buildFOW(bs,bl);
    if(!fow.length)return'';
    return`<div class="sc-divider">Fall of Wickets</div><div class="sc-fow-grid">${fow.map(f=>`<div class="sc-fow-item"><span class="fow-wkt">${f.wkt}-${f.runs}</span><span class="fow-info">${f.batter} (${f.over})</span></div>`).join('')}</div>`;
  }

  function partnerHtml(bs,bl,totRuns){
    const parts=buildPartners(bs,bl);
    if(!parts.length)return'';
    const ords=['1st','2nd','3rd','4th','5th','6th','7th','8th','9th','10th'];
    return`<div class="sc-divider">Partnerships</div>${parts.map((p,i)=>{
      const pct=totRuns>0?Math.round((p.runs/totRuns)*100):0;
      return`<div class="sc-part"><div class="sc-part-top"><span class="part-ord">${ords[i]||i+1+'th'} wkt</span><span class="part-names">${p.bat1} & ${p.bat2}</span><span class="part-runs">${p.runs} (${p.balls}b)</span></div><div class="part-bar-bg"><div class="part-bar-fill" style="width:${pct}%"></div></div></div>`;
    }).join('')}`;
  }

  function inningsExtras(bl){
    const w=bl.filter(b=>b.extra==='WD').length;
    const nb=bl.filter(b=>b.extra==='NB').length;
    return w+nb;
  }

  // player boxes
  const strikerBat=batsmen.find(b=>b.name===striker);
  const nsBat=batsmen.find(b=>b.name===nonStriker);
  const curBowlerData=bowlers.find(b=>b.name===curBowler);

  document.getElementById('mainContent').innerHTML=`
    <!-- MATCH HEADER -->
    <div class="match-header">
      <div class="teams-title">${match.team_batting} vs ${match.team_bowling}</div>
      <div class="match-meta">${limit} Overs${match.venue?' · '+match.venue:''}${match.toss_winner?' · Toss: '+match.toss_winner:''}</div>
      <div class="inn-score-tabs">
        <div class="inn-score-tab ${curInn===1?'active':'inactive'}" onclick="switchScTab('bat1')">
          <div class="ist-label">1st Innings</div>
          <div class="ist-team">${match.team_batting}</div>
          <div class="ist-score">${inn1.runs}<span>/${inn1.wickets}</span></div>
          <div class="ist-overs">(${inn1.overs} ov)</div>
          ${curInn===1?'<div class="ist-batting">BATTING</div>':''}
        </div>
        <div class="inn-score-tab ${curInn===2?'active':'inactive'}" onclick="switchScTab('bat2')">
          <div class="ist-label">2nd Innings</div>
          <div class="ist-team">${match.team_bowling}</div>
          <div class="ist-score">${inn2.runs}<span>/${inn2.wickets}</span></div>
          <div class="ist-overs">(${inn2.overs} ov)</div>
          ${curInn===2?'<div class="ist-batting">BATTING</div>':''}
        </div>
      </div>
      ${rrrHtml}
      <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="crr-row">
        <div class="crr-item"><div class="crr-val">${crr}</div><div class="crr-lbl">CRR</div></div>
        <div class="crr-item"><div class="crr-val">${balls.filter(b=>b.wicket&&b.innings===curInn).length}</div><div class="crr-lbl">Wickets</div></div>
        <div class="crr-item"><div class="crr-val">${balls.filter(b=>b.extra==='WD'&&b.innings===curInn).length}</div><div class="crr-lbl">Wides</div></div>
        <div class="crr-item"><div class="crr-val">${balls.filter(b=>b.extra==='NB'&&b.innings===curInn).length}</div><div class="crr-lbl">NB</div></div>
      </div>
    </div>

    <!-- ON FIELD -->
    <div class="on-field">
      <div class="section-hdr">🏏 On Field — ${curInn===1?match.team_batting:match.team_bowling}</div>
      <div class="batsmen-grid">
        <div class="player-box striker">
          <div class="p-label"><span class="striker-dot"></span>Striker</div>
          <div class="p-name">${striker||'—'}</div>
          <div class="p-stats">${strikerBat?strikerBat.runs+'('+strikerBat.balls+'b) '+strikerBat.fours+'×4 '+strikerBat.sixes+'×6':'—'}</div>
        </div>
        <div class="player-box">
          <div class="p-label">Non-Striker</div>
          <div class="p-name">${nonStriker||'—'}</div>
          <div class="p-stats">${nsBat?nsBat.runs+'('+nsBat.balls+'b)':'—'}</div>
        </div>
      </div>
      <div class="bowler-row">
        <div><div class="p-label">🎳 Bowling — ${curInn===1?match.team_bowling:match.team_batting}</div><div class="p-name">${curBowler||'—'}</div></div>
        <div class="p-stats">${curBowlerData?curBowlerData.wickets+'-'+curBowlerData.runs_given+' ('+Math.floor(curBowlerData.balls/6)+'.'+(curBowlerData.balls%6)+')':'—'}</div>
      </div>
    </div>

    <!-- CURRENT OVER -->
    <div class="over-panel">
      <div class="section-hdr" style="margin-bottom:8px">This Over — ${overNum}</div>
      <div class="over-chips">${overChips}</div>
    </div>

    <!-- COMMENTARY -->
    <div class="comm-panel">
      <div class="comm-hdr">
        <span class="comm-title">🎙️ Live Commentary</span>
        <div class="comm-inn-tabs">
          <div class="comm-inn-tab ${commTabView===1?'active':''}" id="commInnTab1" onclick="switchCommTab(1)">1st Inn</div>
          <div class="comm-inn-tab ${commTabView===2?'active':''}" id="commInnTab2" onclick="switchCommTab(2)">2nd Inn</div>
        </div>
      </div>
      <div class="comm-body" id="commBody">
        <div class="comm-empty">Commentary will appear as balls are bowled</div>
      </div>
    </div>

    <!-- SCORECARD -->
    <div class="sc-panel">
      <div class="sc-top-tabs">
        <div class="sc-top-tab ${scTab==='bat1'?'active':''}" id="scTab-bat1" onclick="switchScTab('bat1')">1st Bat</div>
        <div class="sc-top-tab ${scTab==='bowl1'?'active':''}" id="scTab-bowl1" onclick="switchScTab('bowl1')">1st Bowl</div>
        <div class="sc-top-tab ${scTab==='bat2'?'active':''}" id="scTab-bat2" onclick="switchScTab('bat2')">2nd Bat</div>
        <div class="sc-top-tab ${scTab==='bowl2'?'active':''}" id="scTab-bowl2" onclick="switchScTab('bowl2')">2nd Bowl</div>
      </div>

      <div class="sc-pane ${scTab==='bat1'?'active':''}" id="scPane-bat1">
        <div class="sc-bat-head"><span>${match.team_batting}</span><span style="text-align:right">R</span><span style="text-align:right">B</span><span style="text-align:right">4s</span><span style="text-align:right">6s</span><span style="text-align:right">SR</span></div>
        ${batRows(bat1,balls1)}
        <div class="sc-extras"><span>Extras</span><span>${inningsExtras(balls1)} (WD:${balls1.filter(b=>b.extra==='WD').length} NB:${balls1.filter(b=>b.extra==='NB').length})</span></div>
        <div class="sc-total"><span>Total</span><span>${inn1.runs}/${inn1.wickets} (${inn1.overs} Ov)</span></div>
        ${fowHtml(bat1,balls1)}
        ${partnerHtml(bat1,balls1,inn1.runs)}
      </div>

      <div class="sc-pane ${scTab==='bowl1'?'active':''}" id="scPane-bowl1">
        <div class="sc-bowl-head"><span>${match.team_bowling}</span><span style="text-align:right">O</span><span style="text-align:right">M</span><span style="text-align:right">R</span><span style="text-align:right">W</span><span style="text-align:right">Eco</span></div>
        ${bowlRows(bowl1)}
      </div>

      <div class="sc-pane ${scTab==='bat2'?'active':''}" id="scPane-bat2">
        <div class="sc-bat-head"><span>${match.team_bowling}</span><span style="text-align:right">R</span><span style="text-align:right">B</span><span style="text-align:right">4s</span><span style="text-align:right">6s</span><span style="text-align:right">SR</span></div>
        ${batRows(bat2,balls2)}
        ${bat2.length?`<div class="sc-extras"><span>Extras</span><span>${inningsExtras(balls2)} (WD:${balls2.filter(b=>b.extra==='WD').length} NB:${balls2.filter(b=>b.extra==='NB').length})</span></div><div class="sc-total"><span>Total</span><span>${inn2.runs}/${inn2.wickets} (${inn2.overs} Ov)</span></div>`:''}
        ${bat2.length?fowHtml(bat2,balls2):''}
        ${bat2.length?partnerHtml(bat2,balls2,inn2.runs):''}
      </div>

      <div class="sc-pane ${scTab==='bowl2'?'active':''}" id="scPane-bowl2">
        <div class="sc-bowl-head"><span>${match.team_batting}</span><span style="text-align:right">O</span><span style="text-align:right">M</span><span style="text-align:right">R</span><span style="text-align:right">W</span><span style="text-align:right">Eco</span></div>
        ${bowlRows(bowl2)}
      </div>
    </div>
  `;
  renderCommentary();
}

// Realtime
supabaseClient.channel('live-match-'+matchId)
  .on('postgres_changes',{event:'*',schema:'public',table:'matches',filter:`id=eq.${matchId}`},payload=>{match=payload.new;render();})
  .on('postgres_changes',{event:'*',schema:'public',table:'balls',filter:`match_id=eq.${matchId}`},()=>loadAll())
  .on('postgres_changes',{event:'*',schema:'public',table:'batsmen',filter:`match_id=eq.${matchId}`},()=>loadAll())
  .on('postgres_changes',{event:'*',schema:'public',table:'bowlers',filter:`match_id=eq.${matchId}`},()=>loadAll())
  .subscribe();

loadAll();
</script>
</body>
</html>
